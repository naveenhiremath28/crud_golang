apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: crud-golang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: naveenhiremath28/app-golang:1.0.0
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: crud-golang
spec:
  selector:
    app: app
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004