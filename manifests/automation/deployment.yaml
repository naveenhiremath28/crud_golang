apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: crud-golang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:latest
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
                echo "PostgreSQL not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-keycloak
          image: curlimages/curl:latest
          envFrom:
            - configMapRef:
                name: app-config
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://$KC_HOST:$KC_PORT/health/ready; do
                echo "Keycloak not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        - name: app
          image: naveenhiremath28/app-golang:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app

        # Sidecar: collects logs written by the app container
        - name: log-collector
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Log collector sidecar started. Waiting for log file..."
              while [ ! -f /var/log/app/app.log ]; do
                sleep 2
              done
              echo "Log file found. Tailing logs..."
              tail -F /var/log/app/app.log
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app

      volumes:
        - name: app-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: crud-golang
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000