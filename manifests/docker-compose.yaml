services:
  postgres:
    image: postgres:15
    container_name: postgres
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.1
    container_name: keycloak
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ../scripts/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD", "/opt/keycloak/bin/kcadm.sh", "config", "credentials", "--server", "http://localhost:8080", "--realm", "master", "--user", "dummy", "--password", "dummy", "||", "true"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  app:
    build: ../.
    container_name: crud-app
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data: