# -- Namespace for all resources
namespace: crud-golang

# =============================================================================
# APP — Your Go application
# =============================================================================
app:
  replicaCount: 1
  image:
    repository: naveenhiremath28/app-golang
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  port: 8000
  healthPath: /health

# =============================================================================
# POSTGRESQL — Database
# =============================================================================
postgres:
  image:
    repository: postgres
    tag: latest
  port: 5432

# =============================================================================
# KEYCLOAK — Authentication server
# =============================================================================
keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0.5"
  port: 8080

# =============================================================================
# CONFIG — Non-sensitive environment variables (becomes a ConfigMap)
# =============================================================================
config:
  POSTGRES_DB: "postgres"
  POSTGRES_USER: "postgres"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "postgres"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  KC_HOST: "keycloak"
  KC_PORT: "8080"
  KC_REALM: "employee_realm"
  KEYCLOAK_ADMIN: "admin"

# =============================================================================
# SECRETS — Sensitive values (base64 encoded, becomes a Secret)
# =============================================================================
secrets:
  DB_PASSWORD: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW4=

# =============================================================================
# INGRESS
# =============================================================================
ingress:
  enabled: true
  className: nginx
  host: app.local

# =============================================================================
# DB SEED JOB — One-time database seeding
# =============================================================================
dbSeed:
  enabled: true
  ttlSecondsAfterFinished: 300
  backoffLimit: 3

# =============================================================================
# DB HEALTH CRONJOB — Periodic database health checks
# =============================================================================
dbHealthCheck:
  enabled: true
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# =============================================================================
# LOG COLLECTOR SIDECAR
# =============================================================================
logCollector:
  enabled: true
  image:
    repository: busybox
    tag: latest
