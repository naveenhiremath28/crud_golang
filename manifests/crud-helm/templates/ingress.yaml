{{/*
  Why the `if` guard:
  Not every environment needs an Ingress. In local dev with port-forward,
  you'd set ingress.enabled=false in values.yaml to skip this entirely.
*/}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "crud-golang.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "crud-golang.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: {{ .Values.app.port }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: {{ .Values.keycloak.port }}
{{- end }}
