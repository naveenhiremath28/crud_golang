apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crud-golang.fullname" . }}-keycloak
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "crud-golang.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          args: ["start-dev", "--import-realm", "--health-enabled=true"]
          ports:
            - containerPort: {{ .Values.keycloak.port }}
          envFrom:
            - configMapRef:
                name: {{ include "crud-golang.fullname" . }}-config
            - secretRef:
                name: {{ include "crud-golang.fullname" . }}-secret
          startupProbe:
            httpGet:
              path: /health/started
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: realm-file
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-file
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "crud-golang.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: {{ .Values.keycloak.port }}
      targetPort: {{ .Values.keycloak.port }}
