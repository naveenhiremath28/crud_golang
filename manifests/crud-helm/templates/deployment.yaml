apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crud-golang.fullname" . }}-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "crud-golang.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      # ---------------------------------------------------------------
      # Init Containers — run BEFORE the app starts, one after another
      # Why: App needs PostgreSQL and Keycloak to be ready first
      # ---------------------------------------------------------------
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          envFrom:
            - configMapRef:
                name: {{ include "crud-golang.fullname" . }}-config
            - secretRef:
                name: {{ include "crud-golang.fullname" . }}-secret
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
                echo "PostgreSQL not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-keycloak
          image: curlimages/curl:latest
          envFrom:
            - configMapRef:
                name: {{ include "crud-golang.fullname" . }}-config
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://$KC_HOST:$KC_PORT/health/ready; do
                echo "Keycloak not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        # ---------------------------------------------------------------
        # Main App Container
        # ---------------------------------------------------------------
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
          envFrom:
            - configMapRef:
                name: {{ include "crud-golang.fullname" . }}-config
            - secretRef:
                name: {{ include "crud-golang.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: {{ .Values.app.healthPath }}
              port: {{ .Values.app.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.app.healthPath }}
              port: {{ .Values.app.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
        # ---------------------------------------------------------------
        # Sidecar: Log Collector — runs alongside the app
        # Why togglable: you may not need log collection in local dev
        # ---------------------------------------------------------------
        {{- if .Values.logCollector.enabled }}
        - name: log-collector
          image: "{{ .Values.logCollector.image.repository }}:{{ .Values.logCollector.image.tag }}"
          command:
            - sh
            - -c
            - |
              echo "Log collector sidecar started. Waiting for log file..."
              while [ ! -f /var/log/app/app.log ]; do
                sleep 2
              done
              echo "Log file found. Tailing logs..."
              tail -F /var/log/app/app.log
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
        {{- end }}
      volumes:
        - name: app-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "crud-golang.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - protocol: TCP
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
